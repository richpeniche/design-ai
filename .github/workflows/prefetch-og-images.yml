name: Prefetch OG Images

on:
  push:
    branches: [main]
    paths:
      - 'index.html'   # only runs when index.html changes

permissions:
  contents: write      # needed to commit the cache update
  pull-requests: write # needed to open the auto-PR

jobs:
  prefetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run prefetch script
        run: node prefetch-images.mjs

      - name: Open PR with updated OG cache
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update OG image cache [skip ci]"
          branch: chore/og-image-cache-update
          delete-branch: true
          title: "chore: update OG image cache"
          body: |
            Automated update of prefetched OG image URLs in `index.html`.

            Triggered by a change to `index.html` on `main`.
          labels: "automated,chore"
          author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
